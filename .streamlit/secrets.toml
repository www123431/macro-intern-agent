# ── 执行层配置（部署级策略决策，不在 UI 中修改）────────────────────────────
[trading]
auto_execute_stops     = true   # ATR止损/回撤止损 自动执行（Layer 2）
auto_execute_entries   = false  # 入场触发 仍需人工批准（Layer 3）
monthly_rebalance_auto = false  # 月度再平衡 仍需人工批准（Layer 3）
stop_max_weight_auto   = 0.25   # 自动止损上限：权重超过此值的仓位仍需人工确认
# P4-2 战术层配置
auto_execute_regime_compress = true   # 制度跃变自动压缩（Layer 2）
auto_execute_high_conf_entry = false  # 高置信度入场自动执行（调试期关闭）
tactical_entry_max_weight    = 0.05   # 战术入场权重上限（5%）
tactical_entry_daily_limit   = 2      # 每日最多自动入场数量
regime_jump_threshold_ppt    = 30.0   # 制度跃变 P 变化阈值（百分点）
fast_signal_lookback         = 3      # TSMOM-Fast 形成期（月）
fast_signal_skip             = 1      # TSMOM-Fast 跳过期（月）
entry_composite_score_min    = 60     # 高置信度入场最低综合评分
entry_momentum_zscore_min    = 1.5    # 高置信度入场最低 5日动量 z-score
